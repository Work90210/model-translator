events {
    worker_connections 1024;
}

http {
    # Do not emit nginx version in Server header or error pages
    server_tokens off;

    # Rate limiting zones
    # General zone: 20 req/s per IP (burst up to 40)
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    # Stricter zone for SSE/runtime: 5 req/s per IP
    limit_req_zone $binary_remote_addr zone=runtime:10m rate=5r/s;

    upstream web {
        server web:3000;
    }

    upstream runtime {
        server runtime:3001;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        # TLS configuration — update paths to your certificate files
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Apply general rate limit; allow brief bursts
        limit_req zone=general burst=40 nodelay;
        limit_req_status 429;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Prevent response header injection from upstream
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        location /api/runtime/ {
            # Stricter rate limit for SSE endpoint
            limit_req zone=runtime burst=10 nodelay;

            proxy_pass http://runtime/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Prevent response header injection from upstream
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }
    }
}
