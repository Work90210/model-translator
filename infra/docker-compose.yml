services:
  web:
    image: ghcr.io/${GITHUB_OWNER:-apifold}/apifold-web:latest
    # Do not expose web port directly — all traffic routes through nginx
    expose:
      - "3000"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - VAULT_SECRET
      - VAULT_SALT
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  runtime:
    image: ghcr.io/${GITHUB_OWNER:-apifold}/apifold-runtime:latest
    # Do not expose runtime port directly — all traffic routes through nginx
    expose:
      - "3001"
      - "9090"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - VAULT_SECRET
      - VAULT_SALT
      - NODE_ENV=production
      - RUNTIME_PORT=3001
      - RUNTIME_MAX_WORKERS=${RUNTIME_MAX_WORKERS:-4}
      - RUNTIME_SHUTDOWN_GRACE_MS=${RUNTIME_SHUTDOWN_GRACE_MS:-10000}
      - RUNTIME_HEALTH_PORT=9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: apifold
      POSTGRES_USER: mt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mt -d apifold"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not expose postgres port to the host in production
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Pass password via environment variable; entrypoint script writes config at startup
    # to avoid exposing the password in command-line args (visible in docker inspect / ps)
    command: ["sh", "-c", "echo \"requirepass $REDIS_PASSWORD\" > /tmp/redis.conf && exec redis-server /tmp/redis.conf"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not expose redis port to the host in production
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - runtime
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
