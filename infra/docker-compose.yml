services:
  web:
    image: ghcr.io/${GITHUB_OWNER:-model-translator}/model-translator-web:latest
    # Do not expose web port directly — all traffic routes through nginx
    expose:
      - "3000"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - VAULT_SECRET
      - VAULT_SALT
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  runtime:
    image: ghcr.io/${GITHUB_OWNER:-model-translator}/model-translator-runtime:latest
    # Do not expose runtime port directly — all traffic routes through nginx
    expose:
      - "3001"
    environment:
      - DATABASE_URL
      - REDIS_URL
      - VAULT_SECRET
      - VAULT_SALT
      - NODE_ENV=production
      - RUNTIME_PORT=3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: model_translator
      POSTGRES_USER: mt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mt -d model_translator"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not expose postgres port to the host in production
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Require a password via REDIS_PASSWORD env var
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Do not expose redis port to the host in production
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - runtime
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
