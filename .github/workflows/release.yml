name: Release
on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
  id-token: write
jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile

      - name: Build transformer
        run: pnpm --filter @apifold/transformer build

      - name: Lint and typecheck
        run: pnpm turbo run lint typecheck

      - name: Run tests
        run: pnpm --filter @apifold/transformer test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const packages = JSON.parse('${{ steps.changesets.outputs.publishedPackages }}');
            for (const pkg of packages) {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `${pkg.name}@${pkg.version}`,
                name: `${pkg.name}@${pkg.version}`,
                body: `Released ${pkg.name} v${pkg.version}. See [CHANGELOG](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/packages/transformer/CHANGELOG.md) for details.`,
                generate_release_notes: true,
              });
            }
