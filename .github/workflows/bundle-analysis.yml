name: Bundle Analysis
on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: bundle-${{ github.ref }}
  cancel-in-progress: true
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Build with bundle analysis
        run: pnpm turbo run build --filter=@apifold/web
        env:
          ANALYZE: "true"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_CI || 'ci_placeholder_clerk_secret' }}
          DATABASE_URL: postgresql://ci@localhost:5432/ci
          REDIS_URL: redis://localhost:6379
          VAULT_SECRET: ci_placeholder_vault_secret_minimum_32_characters_long
          VAULT_SALT: ci_placeholder_vault_salt_00000000000000000000000000000000
      - name: Upload bundle analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: apps/web/.next/analyze/
          retention-days: 30
