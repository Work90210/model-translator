name: Security
on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: "0 8 * * 1"
permissions:
  contents: read
  security-events: write
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  trivy-docker:
    name: Trivy Dockerfile scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - apps/web/Dockerfile
          - apps/runtime/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: ${{ matrix.dockerfile }}
          severity: "HIGH,CRITICAL"
          exit-code: "1"

  snyk:
    runs-on: ubuntu-latest
    # Snyk requires SNYK_TOKEN — skipped on fork PRs where secrets are unavailable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Snyk Open Source (dependency vulnerabilities)
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Snyk Code (static analysis)
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high
