name: CI
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck
      - run: pnpm --filter @model-translator/transformer test:coverage
      - uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          working-directory: packages/transformer
      - run: pnpm --filter @model-translator/transformer build
      - name: Check transformer bundle size
        run: |
          SIZE=$(wc -c < packages/transformer/dist/index.js | tr -d ' ')
          if [ "$SIZE" -gt 51200 ]; then
            echo "::error::Transformer bundle exceeds 50KB ($SIZE bytes)"
            exit 1
          fi
