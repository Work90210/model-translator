name: CI
on:
  pull_request:
  push:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck
      - run: pnpm --filter @apifold/transformer test:coverage
      - uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          working-directory: packages/transformer
      - run: pnpm --filter @apifold/transformer build
      - name: Check transformer bundle size (gzipped)
        run: pnpm --filter @apifold/transformer size
